<!-- @startingPoint section="CRM" subtitle="App CRM completa: login, resumen, pipeline y ficha de contacto" viewport="1180x760" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vibe Coder CRM</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; height: 100%; }
  body { background: var(--color-bg); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; color: var(--text-primary); }
  #app { height: 100vh; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--color-border-strong); border-radius: 999px; border: 3px solid var(--color-bg); }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="AppShell.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Pipeline.jsx"></script>
<script type="text/babel" src="ContactDetail.jsx"></script>
<script type="text/babel" src="Login.jsx"></script>
<script type="text/babel" data-presets="react">
  const data = window.CRM_DATA;
  const TITLES = { dashboard: 'Resumen', pipeline: 'Pipeline', contacts: 'Contactos', tasks: 'Tareas', settings: 'Ajustes' };

  function App() {
    const [authed, setAuthed] = React.useState(false);
    const [nav, setNav] = React.useState('dashboard');
    const [contact, setContact] = React.useState(null);
    const { Button } = window.VibeCoderCRMDesignSystem_cdaf1f;
    const Icon = window.Icon;

    if (!authed) return <window.Login onLogin={() => setAuthed(true)} />;

    if (contact) {
      const c = { ...data.contact, name: contact.contact, company: contact.company, stage: contact.stage, value: contact.amount };
      return (
        <window.AppShell active="pipeline" onNav={(k) => { setContact(null); setNav(k); }} user={data.user}
          title="Ficha de contacto"
          action={<Button variant="primary" iconLeft={<Icon name="plus" size={16} color="#fff" />}>Nuevo negocio</Button>}>
          <window.ContactDetail contact={c} onBack={() => setContact(null)} />
        </window.AppShell>
      );
    }

    let body;
    if (nav === 'dashboard') body = <window.Dashboard data={data} onOpenContact={setContact} />;
    else if (nav === 'pipeline') body = <window.Pipeline data={data} onOpen={setContact} />;
    else body = (
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '60%', gap: 10, color: 'var(--text-tertiary)' }}>
        <Icon name={nav === 'contacts' ? 'contacts' : nav === 'tasks' ? 'tasks' : 'settings'} size={32} color="var(--text-tertiary)" />
        <span style={{ fontSize: 15 }}>{TITLES[nav]} — vista de demostración</span>
      </div>
    );

    return (
      <window.AppShell active={nav} onNav={setNav} user={data.user}
        title={TITLES[nav]}
        action={<Button variant="primary" iconLeft={<Icon name="plus" size={16} color="#fff" />}>Nuevo negocio</Button>}>
        {body}
      </window.AppShell>
    );
  }

  ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
