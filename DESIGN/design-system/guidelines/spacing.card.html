<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--color-surface);padding:18px}
  .r{display:flex;align-items:center;gap:14px;padding:3px 0}
  .t{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);width:64px}
  .px{font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);width:40px}
  .bar{height:14px;border-radius:var(--radius-sm);background:var(--color-accent)}
</style>
</head>
<body>
  <div class="r"><span class="t">space.1</span><span class="px">4</span><div class="bar" style="width:4px"></div></div>
  <div class="r"><span class="t">space.2</span><span class="px">8</span><div class="bar" style="width:8px"></div></div>
  <div class="r"><span class="t">space.3</span><span class="px">12</span><div class="bar" style="width:12px"></div></div>
  <div class="r"><span class="t">space.4</span><span class="px">16</span><div class="bar" style="width:16px"></div></div>
  <div class="r"><span class="t">space.6</span><span class="px">24</span><div class="bar" style="width:24px"></div></div>
  <div class="r"><span class="t">space.8</span><span class="px">32</span><div class="bar" style="width:32px"></div></div>
  <div class="r"><span class="t">space.12</span><span class="px">48</span><div class="bar" style="width:48px"></div></div>
  <div class="r"><span class="t">space.16</span><span class="px">64</span><div class="bar" style="width:64px"></div></div>
</body>
</html>
