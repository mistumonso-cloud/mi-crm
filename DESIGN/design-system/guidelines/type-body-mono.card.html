<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--color-surface);padding:18px;color:var(--text-primary)}
  .wrap{display:flex;gap:28px;align-items:flex-start}
  .body{max-width:340px;font-size:var(--text-body-sm);line-height:var(--leading-relaxed);color:var(--text-secondary)}
  .body strong{color:var(--text-primary)}
  .mono{font-family:var(--font-mono);font-size:13px;color:var(--text-primary);display:flex;flex-direction:column;gap:7px}
  .mono .k{color:var(--text-tertiary)}
  .mv{font-size:var(--text-display);font-weight:var(--weight-bold);letter-spacing:-.02em}
</style>
</head>
<body>
  <div class="wrap">
    <div class="body"><strong>Ana Torres</strong> respondió a tu propuesta y quiere agendar una llamada esta semana. El cuerpo se compone en Inter a 14px con interlineado 1.6 para máxima legibilidad en móvil.</div>
    <div class="mono">
      <span class="mv">$12,480</span>
      <span><span class="k">deal_id</span>  VC-2048</span>
      <span><span class="k">prob</span>     78%</span>
      <span><span class="k">cierre</span>   2026-07-04</span>
    </div>
  </div>
</body>
</html>
