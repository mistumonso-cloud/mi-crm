<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="CRM Dashboard" description="Panel de Marta: resumen del pipeline activo, ventas cerradas del mes y contactos inactivos. Lectura de un vistazo." -->
<helmet>
  <script src="./ds-base.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  </style>
</helmet>

<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; background:#E5E7EB;">
  <div style="width:375px; height:812px; border-radius:40px; background:#FAFAFA; box-shadow:0 8px 24px rgba(16,24,40,.12), 0 32px 64px rgba(16,24,40,.16); overflow:hidden; position:relative; display:flex; flex-direction:column;">

    <!-- Status bar -->
    <div style="height:44px; background:#fff; display:flex; align-items:center; justify-content:space-between; padding:0 24px; flex-shrink:0;">
      <span style="font:600 14px/1 'Inter',system-ui; color:#1A1D24;">9:41</span>
      <div style="display:flex; align-items:center; gap:6px;">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="#1A1D24"><rect x="0" y="4" width="3" height="8" rx="1"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1"/><rect x="9" y="0.5" width="3" height="11.5" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1"/></svg>
        <svg width="20" height="12" viewBox="0 0 20 12" fill="none"><rect x=".75" y=".75" width="17" height="10.5" rx="2.25" stroke="#1A1D24" stroke-width="1.5"/><rect x="18.25" y="3.5" width="1.25" height="5" rx=".625" fill="#1A1D24"/><rect x="2" y="2" width="12" height="8" rx="1.5" fill="#1A1D24"/></svg>
      </div>
    </div>

    <!-- Header -->
    <div style="background:#fff; border-bottom:1px solid #E5E7EB; padding:12px 20px 14px; flex-shrink:0;">
      <h1 style="font:700 22px/1.2 'Inter',system-ui; color:#1A1D24; letter-spacing:-0.02em; margin-bottom:3px;">Panel</h1>
      <p style="font:400 13px/1 'Inter',system-ui; color:#9CA3AF;">{{ dateLabel }}</p>
    </div>

    <!-- CONTENIDO LLENO -->
    <sc-if value="{{ notEmpty }}" hint-placeholder-val="{{ true }}">
      <div style="flex:1; overflow-y:auto; padding:20px 16px 8px;">

        <!-- Pipeline activo -->
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
          <span style="font:600 11px/1 'Inter',system-ui; color:#9CA3AF; letter-spacing:0.06em; text-transform:uppercase; white-space:nowrap;">Pipeline activo</span>
          <div style="flex:1; height:1px; background:#E5E7EB;"></div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:24px;">

          <!-- Lead nuevo -->
          <button style="display:flex; flex-direction:column; justify-content:space-between; padding:14px 12px 14px 16px; background:#E0F2FE; border-radius:12px; border:1.5px solid #BAE6FD; border-left:4px solid #0369A1; cursor:pointer; min-height:94px; text-align:left; width:100%; transition:opacity .12s;" style-hover="opacity:0.82;" style-active="opacity:0.65;">
            <span style="font:700 36px/1 'Inter',system-ui; color:#0369A1; letter-spacing:-0.02em; display:block;">{{ leadCount }}</span>
            <div style="display:flex; align-items:center; justify-content:space-between; margin-top:8px;">
              <span style="font:600 10px/1 'Inter',system-ui; color:#0369A1; text-transform:uppercase; letter-spacing:0.05em;">Lead nuevo</span>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#0369A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
          </button>

          <!-- En conversación -->
          <button style="display:flex; flex-direction:column; justify-content:space-between; padding:14px 12px 14px 16px; background:#EAEFF3; border-radius:12px; border:1.5px solid #D6E0E6; border-left:4px solid #3B5266; cursor:pointer; min-height:94px; text-align:left; width:100%; transition:opacity .12s;" style-hover="opacity:0.82;" style-active="opacity:0.65;">
            <span style="font:700 36px/1 'Inter',system-ui; color:#3B5266; letter-spacing:-0.02em; display:block;">{{ talkingCount }}</span>
            <div style="display:flex; align-items:center; justify-content:space-between; margin-top:8px;">
              <span style="font:600 10px/1 'Inter',system-ui; color:#3B5266; text-transform:uppercase; letter-spacing:0.05em;">Conversación</span>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#3B5266" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
          </button>

          <!-- Propuesta enviada -->
          <button style="display:flex; flex-direction:column; justify-content:space-between; padding:14px 12px 14px 16px; background:#F3E8FF; border-radius:12px; border:1.5px solid #E9D5FF; border-left:4px solid #7E22CE; cursor:pointer; min-height:94px; text-align:left; width:100%; transition:opacity .12s;" style-hover="opacity:0.82;" style-active="opacity:0.65;">
            <span style="font:700 36px/1 'Inter',system-ui; color:#7E22CE; letter-spacing:-0.02em; display:block;">{{ proposalCount }}</span>
            <div style="display:flex; align-items:center; justify-content:space-between; margin-top:8px;">
              <span style="font:600 10px/1 'Inter',system-ui; color:#7E22CE; text-transform:uppercase; letter-spacing:0.05em;">Propuesta</span>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#7E22CE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
          </button>

          <!-- Negociando -->
          <button style="display:flex; flex-direction:column; justify-content:space-between; padding:14px 12px 14px 16px; background:#FFEDD5; border-radius:12px; border:1.5px solid #FED7AA; border-left:4px solid #C2410C; cursor:pointer; min-height:94px; text-align:left; width:100%; transition:opacity .12s;" style-hover="opacity:0.82;" style-active="opacity:0.65;">
            <span style="font:700 36px/1 'Inter',system-ui; color:#C2410C; letter-spacing:-0.02em; display:block;">{{ negotiatingCount }}</span>
            <div style="display:flex; align-items:center; justify-content:space-between; margin-top:8px;">
              <span style="font:600 10px/1 'Inter',system-ui; color:#C2410C; text-transform:uppercase; letter-spacing:0.05em;">Negociando</span>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#C2410C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
          </button>

        </div>

        <!-- Este mes -->
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
          <span style="font:600 11px/1 'Inter',system-ui; color:#9CA3AF; letter-spacing:0.06em; text-transform:uppercase; white-space:nowrap;">Este mes</span>
          <div style="flex:1; height:1px; background:#E5E7EB;"></div>
        </div>

        <div style="display:flex; gap:10px; margin-bottom:20px;">

          <!-- Ganadas -->
          <div style="flex:1; background:#DCFCE7; border-radius:12px; border:1.5px solid #BBF7D0; padding:16px 14px; display:flex; flex-direction:column; gap:8px;">
            <div style="display:flex; align-items:center; gap:9px;">
              <div style="width:28px; height:28px; border-radius:999px; background:#16A34A; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
              <span style="font:700 32px/1 'Inter',system-ui; color:#15803D; letter-spacing:-0.02em;">{{ wonCount }}</span>
            </div>
            <span style="font:500 12px/1 'Inter',system-ui; color:#16A34A;">ventas ganadas</span>
          </div>

          <!-- Perdidas -->
          <div style="flex:1; background:#FEE2E2; border-radius:12px; border:1.5px solid #FECACA; padding:16px 14px; display:flex; flex-direction:column; gap:8px;">
            <div style="display:flex; align-items:center; gap:9px;">
              <div style="width:28px; height:28px; border-radius:999px; background:#EF4444; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </div>
              <span style="font:700 28px/1 'Inter',system-ui; color:#B91C1C; letter-spacing:-0.02em;">{{ lostCount }}</span>
            </div>
            <span style="font:500 12px/1 'Inter',system-ui; color:#EF4444;">ventas perdidas</span>
          </div>

        </div>

        <!-- Inactivos -->
        <button style="display:flex; align-items:center; gap:12px; padding:14px 16px; background:#FFFBEB; border-radius:12px; border:1.5px solid #FEF3C7; cursor:pointer; width:100%; text-align:left; transition:background .12s;" style-hover="background:#FEF9C3;" style-active="background:#FDE68A;">
          <div style="width:36px; height:36px; border-radius:8px; background:#FEF3C7; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#B45309" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </div>
          <span style="flex:1; font:600 13px/1.3 'Inter',system-ui; color:#B45309;">{{ inactiveCount }} contactos inactivos — revisar</span>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#B45309" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>

        <div style="height:16px;"></div>
      </div>
    </sc-if>

    <!-- ESTADO VACÍO -->
    <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ false }}">
      <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 32px; text-align:center; gap:16px;">
        <div style="width:72px; height:72px; border-radius:999px; background:#EAEFF3; display:flex; align-items:center; justify-content:center;">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#3B5266" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        </div>
        <div style="display:flex; flex-direction:column; gap:6px;">
          <span style="font:600 17px/1.2 'Inter',system-ui; color:#1A1D24;">Sin contactos aún</span>
          <span style="font:400 13px/1.55 'Inter',system-ui; color:#6B7280;">Añade tu primer contacto para ver el panel de ventas</span>
        </div>
        <button style="background:#3B5266; color:#fff; border:none; border-radius:8px; font:600 14px/1 'Inter',system-ui; padding:12px 20px; cursor:pointer; transition:background .15s;" style-hover="background:#2E4252;" style-active="background:#233442;">Añadir primer contacto</button>
      </div>
    </sc-if>

    <!-- Navegación inferior -->
    <div style="height:72px; background:#fff; border-top:1px solid #E5E7EB; display:flex; align-items:center; padding:0 8px; flex-shrink:0;">

      <button style="flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px 0; background:none; border:none; cursor:pointer; color:#9CA3AF; transition:color .15s;" style-hover="color:#6B7280;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span style="font:500 11px/1 'Inter',system-ui;">Pendientes</span>
      </button>

      <button style="flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px 0; background:none; border:none; cursor:pointer; color:#9CA3AF; transition:color .15s;" style-hover="color:#6B7280;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span style="font:500 11px/1 'Inter',system-ui;">Contactos</span>
      </button>

      <button style="flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px 0; background:none; border:none; cursor:pointer; color:#3B5266; transition:opacity .15s;" style-hover="opacity:0.75;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span style="font:600 11px/1 'Inter',system-ui;">Panel</span>
      </button>

    </div>

    <!-- FAB -->
    <button style="position:absolute; bottom:84px; right:16px; width:52px; height:52px; border-radius:999px; background:#3B5266; color:#fff; border:none; cursor:pointer; font:300 26px/1 'Inter',system-ui; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(59,82,102,.35); z-index:10; transition:background .15s, transform .1s;" style-hover="background:#2E4252;" style-active="transform:scale(0.94); background:#233442;">+</button>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 423, &quot;height&quot;: 860 },
  &quot;demoState&quot;: {
    &quot;editor&quot;: &quot;enum&quot;,
    &quot;options&quot;: [&quot;list&quot;, &quot;empty&quot;],
    &quot;default&quot;: &quot;list&quot;,
    &quot;section&quot;: &quot;Estado de demo&quot;
  }
}">
class Component extends DCLogic {
  renderVals() {
    const demo    = this.props.demoState ?? 'list';
    const isEmpty = demo === 'empty';

    const now = new Date();
    const days  = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
    const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    const dateLabel = `${days[now.getDay()].charAt(0).toUpperCase() + days[now.getDay()].slice(1)}, ${now.getDate()} de ${months[now.getMonth()]}`;

    return {
      dateLabel,
      isEmpty,
      notEmpty:         !isEmpty,
      leadCount:        8,
      talkingCount:     5,
      proposalCount:    3,
      negotiatingCount: 2,
      wonCount:         7,
      lostCount:        1,
      inactiveCount:    4,
    };
  }
}
</script>
</body>
</html>
