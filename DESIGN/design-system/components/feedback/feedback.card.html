<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--color-bg);padding:18px;color:var(--text-primary)}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .lbl{font-size:11px;font-weight:600;color:var(--text-tertiary);width:100%;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Badge, StatusBadge } = window.VibeCoderCRMDesignSystem_cdaf1f;
  const states = ['lead','talking','proposal','negotiating','won','lost','inactive'];
  function Demo() {
    return (
      <div>
        <div className="row">
          <span className="lbl">StatusBadge — pipeline de ventas</span>
          {states.map(s => <StatusBadge key={s} state={s} />)}
        </div>
        <div className="row">
          <span className="lbl">Badge — semántico</span>
          <Badge tone="success" dot>Activo</Badge>
          <Badge tone="warning" dot>Vence hoy</Badge>
          <Badge tone="danger" dot>Atrasado</Badge>
          <Badge tone="neutral">Borrador</Badge>
          <Badge tone="accent">Nuevo</Badge>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
