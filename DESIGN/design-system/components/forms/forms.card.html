<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--color-bg);padding:18px;color:var(--text-primary)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:560px}
  .stack{display:flex;flex-direction:column;gap:12px}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Input, Select, Checkbox, Switch } = window.VibeCoderCRMDesignSystem_cdaf1f;
  function Demo() {
    const [v, setV] = React.useState('won');
    const [c, setC] = React.useState(true);
    const [s, setS] = React.useState(true);
    return (
      <div className="grid">
        <div className="stack">
          <Input label="Nombre" placeholder="Ana Torres" />
          <Input label="Importe" prefix="$" placeholder="0.00" />
        </div>
        <div className="stack">
          <Input label="Email" error="Email no válido" defaultValue="ana@" />
          <Select label="Estado" value={v} onChange={e=>setV(e.target.value)}
            options={[{value:'won',label:'Ganado'},{value:'lost',label:'Perdido'},{value:'lead',label:'Lead nuevo'}]} />
          <div style={{display:'flex',gap:20,marginTop:4}}>
            <Checkbox checked={c} onChange={setC} label="Newsletter" />
            <Switch checked={s} onChange={setS} label="Activo" />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
